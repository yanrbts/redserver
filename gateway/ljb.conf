# ===================================================================
#                LJB Device Local Context Configuration
# ===================================================================

cpudev          /dev/pts/11
ipmcdev         /dev/pts/10

# -------------------------------------------------------------------
# 1. Rack & Slot Location (1 Byte Each)
#    - Supports decimal (0-255) or hex format (0x00 - 0xFF)
# -------------------------------------------------------------------
rackid          0x01
slotid          0x0C

# -------------------------------------------------------------------
# 2. Device Serial Number (Exactly 8 Bytes)
# -------------------------------------------------------------------
devicesn        010200A10064

# -------------------------------------------------------------------
# 3. Software Version (ljb_version_t)
#    - sw_ver.ymd: Format YYYYMMDD (e.g., 20260720)
# -------------------------------------------------------------------
sw_major        2
sw_minor        1
sw_revision     0
sw_build        100
sw_ymd          20260720

# -------------------------------------------------------------------
# 4. Hardware Version (ljb_version_t)
#    - hw_ver.ymd: Format YYYYMMDD (e.g., 20251201)
# -------------------------------------------------------------------
hw_major        1
hw_minor        0
hw_revision     0
hw_build        1
hw_ymd          20251201

# -------------------------------------------------------------------
# 5. Uptime Statistics
#    - total_half_hours: Cumulative uptime (unit: 0.5 hours)
#    - current_uptime_sec: Current session uptime (unit: seconds)
# -------------------------------------------------------------------
total_uptime    78
